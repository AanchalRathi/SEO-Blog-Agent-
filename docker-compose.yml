version: "3.9"

services:

  api:
    build: .
    container_name: seo_agent_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./brand_docs:/app/brand_docs
      - ./chroma_store:/app/chroma_store
      - ./output:/app/output
    restart: unless-stopped

  ui:
    build: .
    container_name: seo_agent_ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped